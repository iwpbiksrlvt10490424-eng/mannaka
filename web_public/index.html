<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aimachi | お店の候補</title>
<meta property="og:title" content="Aimachi | お店の候補" />
<meta property="og:description" content="友達がシェアしたお店の候補を見る" />
<style>
  :root {
    --pink:#FF6B81;
    --ink:#1F1D2B;
    --sub:#5F5B70;
    --bg:#F7F7F7;
    --card:#FFFFFF;
    --border:#E8E4DC;
    --accent:#06C755;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:480px; margin:0 auto; padding:20px 16px 80px; }
  h1{ font-size:20px; margin:0 0 4px; font-weight:800; letter-spacing:-0.3px; }
  .muted{ color:var(--sub); font-size:13px; }
  .meta{ background:var(--card); border-radius:14px; padding:14px; margin:12px 0 16px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05); }
  .meta-row{ display:flex; align-items:center; gap:6px; font-size:13px; color:var(--sub);
    margin:2px 0; }
  .meta-row b{ color:var(--ink); font-weight:700; }
  .sec-title{ font-size:13px; font-weight:700; color:var(--sub); margin:16px 2px 8px; }
  .card{ background:var(--card); border-radius:14px; padding:14px; margin-bottom:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05); display:flex; gap:12px; }
  .thumb{ flex-shrink:0; width:76px; height:76px; background:#EEE; border-radius:10px;
    background-size:cover; background-position:center; }
  .name{ font-size:15px; font-weight:800; letter-spacing:-0.2px; margin:0 0 4px; }
  .sub{ font-size:12px; color:var(--sub); }
  .rating{ color:#F5B301; font-weight:700; }
  .badges{ display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  .badge{ font-size:10px; font-weight:700; padding:2px 6px; border-radius:6px; }
  .badge.reserve{ color:#22A06B; background:rgba(34,160,107,.12); }
  a.btn{ display:inline-block; margin-top:8px; padding:6px 10px; font-size:12px; font-weight:700;
    color:#1A73E8; text-decoration:none; border:1px solid #1A73E8; border-radius:8px; }
  .cta{ margin-top:20px; background:var(--pink); color:#fff; text-decoration:none; display:block;
    text-align:center; padding:14px; border-radius:14px; font-weight:800; font-size:14px; }
  .empty{ text-align:center; padding:80px 20px; color:var(--sub); font-size:14px; }
  .footer{ text-align:center; font-size:11px; color:var(--sub); margin-top:28px; }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="empty">読み込み中…</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

// Firebase 設定。公開キーなのでブラウザに出しても安全（Firestore rules で保護）。
const firebaseConfig = {
  apiKey: "AIzaSyDyt34Y1fXXpdwWZwyZ3gOa0tH5U1jL4eY",
  authDomain: "mannnaka.firebaseapp.com",
  projectId: "mannnaka",
  appId: "1:994245428850:web:placeholder",
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const path = window.location.pathname;
const m = path.match(/\/s\/([A-Za-z0-9_-]+)/);
const app_ = document.getElementById("app");

function esc(s){ return String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }

function mapsUrl(lat, lng, name){
  if (lat && lng) return `https://maps.google.com/maps?q=${lat},${lng}&t=m`;
  if (name) return `https://maps.google.com/maps?q=${encodeURIComponent(name)}`;
  return null;
}

async function logOpen(shareId){
  try{
    await addDoc(collection(db, "share_link_opens"), {
      shareId,
      ua: navigator.userAgent,
      referrer: document.referrer || "",
      ts: serverTimestamp(),
    });
  } catch(e){ /* 失敗しても続行 */ }
}

async function render(){
  if (!m) { app_.innerHTML = `<div class="empty">URLが正しくありません</div>`; return; }
  const shareId = m[1];
  await logOpen(shareId);
  try {
    const snap = await getDoc(doc(db, "public_shares", shareId));
    if (!snap.exists()) {
      app_.innerHTML = `<div class="empty">共有が見つかりませんでした</div>`;
      return;
    }
    const d = snap.data();
    const cands = d.candidates || [];
    const meta = [];
    if (d.stationName) meta.push(`<div class="meta-row">📍 集合 <b>${esc(d.stationName)}駅</b></div>`);
    const dateLabel = d.date ? new Date(d.date).toLocaleDateString("ja-JP", {month:"numeric", day:"numeric"}) : "";
    const timeLabel = d.meetingTime || "";
    if (dateLabel || timeLabel) meta.push(`<div class="meta-row">🗓 <b>${esc(dateLabel)} ${esc(timeLabel)}</b></div>`);

    const list = cands.map(c => {
      const thumb = c.imageUrl ? `style="background-image:url('${esc(c.imageUrl)}')"` : "";
      const rating = c.rating > 0 ? `<span class="rating">★${c.rating.toFixed(1)}</span>` : "";
      const reserve = c.isReservable ? `<span class="badge reserve">予約可</span>` : "";
      const url = mapsUrl(c.lat, c.lng, c.name);
      const mapBtn = url ? `<a class="btn" href="${url}" target="_blank" rel="noopener">Google マップで開く</a>` : "";
      return `
        <div class="card">
          <div class="thumb" ${thumb}></div>
          <div style="flex:1; min-width:0;">
            <div class="name">${esc(c.name)}</div>
            <div class="sub">${esc(c.category)} · ${esc(c.priceStr)} ${rating}</div>
            <div class="badges">${reserve}</div>
            ${mapBtn}
          </div>
        </div>
      `;
    }).join("");

    app_.innerHTML = `
      <h1>お店の候補（${cands.length}件）</h1>
      <div class="muted">友達がシェアしたお店の候補です</div>
      <div class="meta">${meta.join("")}</div>
      <div class="sec-title">候補</div>
      ${list}
      <a class="cta" href="https://apps.apple.com/app/id6743108270">Aimachiをダウンロード（無料）</a>
      <div class="footer">Aimachi — まんなかで集まろう</div>
    `;
  } catch(e) {
    app_.innerHTML = `<div class="empty">読み込みに失敗しました<br><small>${esc(e.message||"")}</small></div>`;
  }
}
render();
</script>
</body>
</html>
